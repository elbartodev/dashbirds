{% extends "base.html" %}
{% block title %}Meu Perfil{% endblock %}
{% block page_title %}Meu Perfil{% endblock %}
{% block content %}
<div style="max-width:580px">
  {% if msg %}
  <div class="alert {% if msg_type == 'danger' %}a-danger{% else %}a-success{% endif %}">{{ msg }}</div>
  {% endif %}

  <div class="card">
    <div class="card-header"><span class="card-title">Dados Pessoais</span></div>
    <form method="POST">
      <input type="hidden" name="acao" value="dados">
      <div class="fg"><label>Nome Completo</label><input type="text" name="nome" value="{{ usuario.nome }}" required></div>
      <div class="grid2">
        <div class="fg"><label>Nome do Criadouro</label><input type="text" name="criadouro" value="{{ usuario.criadouro }}"></div>
        <div class="fg"><label>CPF / CNPJ</label><input type="text" value="{{ usuario.documento or '' }}" style="background:#f3f4f6" readonly></div>
      </div>
      <div class="grid2">
        <div class="fg"><label>E-mail</label><input type="email" name="email" value="{{ usuario.email }}" required></div>
        <div class="fg"><label>Telefone</label><input type="text" name="telefone" value="{{ usuario.telefone or '' }}"></div>
      </div>
      <button type="submit" class="btn btn-primary">Salvar Dados</button>
    </form>
  </div>

  <div class="card">
    <div class="card-header"><span class="card-title">Alterar Senha</span></div>
    <form method="POST">
      <input type="hidden" name="acao" value="senha">
      <div class="fg"><label>Senha Atual</label><input type="password" name="senha_atual" placeholder="••••••••" required></div>
      <div class="grid2">
        <div class="fg"><label>Nova Senha</label><input type="password" name="senha_nova" placeholder="••••••••" required></div>
        <div class="fg"><label>Confirmar Nova Senha</label><input type="password" name="senha_nova2" placeholder="••••••••" required></div>
      </div>
      <button type="submit" class="btn btn-accent">Alterar Senha</button>
    </form>
  </div>
</div>
{% endblock %}
